; e-drummer capture firmware — PlatformIO configuration
;
; Two environments, mirroring the brain's engine/io split (capture spec §2,
; firmware architecture plan):
;
;   esp32-s3-devkitc-1  — the real target (Arduino core 2.x / ESP-IDF 4.4:
;                         usb_host + legacy I2S driver APIs)
;   native              — host build: runs every lib/edrum_core unit test,
;                         including the golden-fixture byte-conformance suite,
;                         with no hardware attached (pio test -e native)
;
; lib/edrum_core      = pure C++14, no Arduino/ESP-IDF includes (enforced by the
;                       native build), the firmware's "engine"
; lib/edrum_hal       = narrow port interfaces (IClock, IStorage, ...)
; lib/edrum_platform  = ESP32-only adapters; lib_ignore'd from native

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Flash / partition table (N16R8: 16MB flash)
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; PSRAM (OPI / Octal for N16R8 modules)
board_build.arduino.memory_type = qio_opi

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++14
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    greiman/SdFat@^2.2.2

monitor_speed = 115200
monitor_filters = send_on_enter

; Embedded tests require the board on the UART port (spec §8.3).
; test_build_project_src = no keeps production src/ out of the test
; build and suppresses a PlatformIO SCons TypeError in the memory-size
; reporter that fires on Xtensa test binaries with unusual ELF sections.
test_filter = embedded/*
test_build_src = no

[env:native]
platform = native

; Static runtime linking lives in tools/native_link_static.py
; (PlatformIO routes -static* build_flags to the compiler only,
; not the linker.)
build_flags =
    -std=gnu++14
    -Wall
    -Wextra

extra_scripts = pre:tools/native_link_static.py

lib_ignore = edrum_platform

test_filter = native/*